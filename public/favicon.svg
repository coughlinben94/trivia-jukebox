<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Lid: thin top strip showing lid thickness -->
  <polygon points="14,8 80,8 82,12 16,12" fill="#5a6ad4" stroke="#0b0d16" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Lid: inner face (what you see when lid is open) -->
  <polygon points="20,48 86,48 82,12 16,12" fill="#7b8cff" stroke="#0b0d16" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Body: right side face -->
  <polygon points="74,68 74,90 86,70 86,48" fill="#4d5cbb" stroke="#0b0d16" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Body: top face (where record sits) -->
  <polygon points="8,68 74,68 86,48 20,48" fill="#6b7be0" stroke="#0b0d16" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Body: front face -->
  <polygon points="8,68 74,68 74,90 8,90" fill="#7b8cff" stroke="#0b0d16" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Vinyl record -->
  <ellipse cx="38" cy="62" rx="22" ry="10" fill="#0c0e18"/>
  <!-- Groove rings -->
  <ellipse cx="38" cy="62" rx="17" ry="7.7" fill="none" stroke="#1e2438" stroke-width="1"/>
  <ellipse cx="38" cy="62" rx="12" ry="5.5" fill="none" stroke="#1e2438" stroke-width="0.7"/>
  <!-- Center label -->
  <ellipse cx="38" cy="62" rx="7" ry="3.2" fill="#7b8cff"/>
  <!-- Center hole -->
  <ellipse cx="38" cy="62" rx="2.2" ry="1" fill="#0b0d16"/>

  <!-- Tonearm pivot -->
  <ellipse cx="78" cy="53" rx="3" ry="1.8" fill="#94a3ff" stroke="#0b0d16" stroke-width="0.8"/>
  <!-- Tonearm body -->
  <line x1="77" y1="53" x2="48" y2="64" stroke="#dde3ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Headshell tip -->
  <line x1="48" y1="64" x2="44" y2="66" stroke="#dde3ff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Speaker dots on front face -->
  <circle cx="24" cy="81" r="5.5" fill="#0b0d16" stroke="#1a1e30" stroke-width="0.8"/>
  <circle cx="44" cy="81" r="5.5" fill="#0b0d16" stroke="#1a1e30" stroke-width="0.8"/>
</svg>
